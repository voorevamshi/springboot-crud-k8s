server:
   port: 8000
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # Syntax: ${VAR_NAME:fallback_value}
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:vmc_order}?useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    hikari:
      initialization-fail-timeout: 0
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    generate-ddl: true
    show-sql: true
    hibernate:
      ddl-auto: update